<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Innovakit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        .sidebar { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .nav-item { transition: all 0.3s ease; }
        .nav-item.active { background: rgba(59,130,246,0.2); border-left: 4px solid #3b82f6; }
        .card { transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .btn-primary { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-danger { background: #ef4444; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #10b981; color: white; padding: 8px 16px; border-radius: 8px; transition: all 0.3s ease; }
        .btn-success:hover { background: #059669; }
        .modal { transition: opacity 0.3s ease; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; width: 100%; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; ring: 2px solid #3b82f6; }
        
        /* Botón admin oculto que solo aparece para usuarios admin */
        .admin-float-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #7eb74a;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .admin-float-btn:hover {
            transform: scale(1.1);
            background: #5a8f32;
        }
    </style>
</head>
<body class="bg-gray-100">
    
    <!-- Pantalla de carga -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-gray-600">Verificando acceso...</p>
        </div>
    </div>
    
    <!-- Panel Admin (oculto inicialmente) -->
    <div id="admin-panel" class="hidden">
        <!-- Sidebar -->
        <div class="flex min-h-screen">
            <div class="sidebar w-64 fixed h-full text-white">
                <div class="p-6 border-b border-gray-700">
                    <h1 class="text-2xl font-bold">
                        <span style="color:#7eb74a">Innova</span><span class="text-blue-400">kit</span>
                        <span class="text-xs block text-gray-400 mt-1">Panel Admin</span>
                    </h1>
                </div>
                
                <nav class="p-4 space-y-1">
                    <button onclick="cargarDashboard()" id="nav-dashboard" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-chart-line w-5"></i> Dashboard
                    </button>
                    <button onclick="cargarProductos()" id="nav-productos" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-microchip w-5"></i> Productos
                    </button>
                    <button onclick="cargarKits()" id="nav-kits" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-box w-5"></i> Kits
                    </button>
                    <button onclick="cargarReviews()" id="nav-reviews" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-star w-5"></i> Reviews
                    </button>
                    <button onclick="cargarPedidos()" id="nav-pedidos" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-shopping-cart w-5"></i> Pedidos
                    </button>
                    <button onclick="cargarUsuarios()" id="nav-usuarios" class="nav-item w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 hover:bg-gray-700 transition">
                        <i class="fas fa-users w-5"></i> Usuarios
                    </button>
                </nav>
                
                <div class="absolute bottom-0 w-64 p-4 border-t border-gray-700">
                    <div class="flex items-center gap-3 mb-3">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <div>
                            <p id="admin-nombre" class="font-semibold">Administrador</p>
                            <p id="admin-email" class="text-xs text-gray-400">admin@innovakit.com</p>
                        </div>
                    </div>
                    <button onclick="cerrarSesion()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition">
                        <i class="fas fa-sign-out-alt mr-2"></i> Cerrar sesión
                    </button>
                </div>
            </div>
            
            <!-- Contenido principal -->
            <div class="ml-64 flex-1 p-8">
                <div id="contenido-principal">
                    <!-- El contenido se carga dinámicamente -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal para agregar/editar producto -->
    <div id="modal-producto" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="modal-titulo" class="text-2xl font-bold">Agregar Producto</h3>
                    <button onclick="cerrarModalProducto()" class="text-2xl">&times;</button>
                </div>
                <form id="form-producto">
                    <input type="hidden" id="producto-id">
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Nombre *</label>
                        <input type="text" id="prod-nombre" required class="w-full">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Descripción</label>
                        <textarea id="prod-descripcion" rows="4" class="w-full"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">Precio (Gs.) *</label>
                            <input type="number" id="prod-precio" required class="w-full">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">Categoría</label>
                            <input type="text" id="prod-categoria" placeholder="Ej: Sensores, Placas" class="w-full">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Imagen principal</label>
                        <input type="text" id="prod-imagen" placeholder="comp/producto.webp" class="w-full">
                        <p class="text-xs text-gray-500 mt-1">Ruta relativa a la raíz del sitio</p>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-1">Especificaciones (una por línea)</label>
                        <textarea id="prod-especificaciones" rows="5" class="w-full" placeholder="Microcontrolador ATmega328P&#10;14 pines digitales&#10;6 pines analógicos"></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="prod-stock" checked> 
                            <span class="text-sm font-semibold">Producto disponible</span>
                        </label>
                    </div>
                    
                    <div class="flex gap-3">
                        <button type="submit" class="flex-1 btn-primary">Guardar</button>
                        <button type="button" onclick="cerrarModalProducto()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-2 rounded-lg">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Botón flotante para admin (visible solo cuando el usuario es admin) -->
    <a href="/admin.html" id="admin-float-btn" class="admin-float-btn hidden" title="Panel Administrador">
        <i class="fas fa-crown text-xl"></i>
    </a>
    
    <script>
        // ============================================
        // CONFIGURACIÓN DE SUPABASE (SOLO UNA VEZ)
        // ============================================
        const SUPABASE_URL = 'https://lvdjczfblanbadikccxo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_O9oR1xmyeAy1ludJJlo3Rw_2gW9XZ_F';
        const supabaseAdmin = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let usuarioActual = null;
        let productos = [];
        let kits = [];
        
        // ============================================
        // VERIFICAR ACCESO ADMIN
        // ============================================
        async function verificarAcceso() {
            console.log('🔍 Verificando acceso...');
            
            try {
                const { data: { user }, error: userError } = await supabaseAdmin.auth.getUser();
                
                if (userError) {
                    console.error('❌ Error:', userError);
                    document.getElementById('loading-screen').innerHTML = `<div class="text-center"><p class="text-red-600">Error de autenticación</p><button onclick="window.location.href='/'" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Volver</button></div>`;
                    return;
                }
                
                if (!user) {
                    window.location.href = '/';
                    return;
                }
                
                const { data: perfil, error: perfilError } = await supabaseAdmin
                    .from('perfiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();
                
                if (perfilError || !perfil?.es_admin) {
                    alert('No tienes permisos de administrador');
                    window.location.href = '/';
                    return;
                }
                
                usuarioActual = { id: user.id, email: user.email, nombre: perfil.nombre };
                document.getElementById('admin-nombre').textContent = usuarioActual.nombre;
                document.getElementById('admin-email').textContent = usuarioActual.email;
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                
                cargarDashboard();
                
            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('loading-screen').innerHTML = `<div class="text-center"><p class="text-red-600">Error: ${error.message}</p><button onclick="window.location.href='/'" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">Volver</button></div>`;
            }
        }
        
        // ============================================
        // DASHBOARD
        // ============================================
        async function cargarDashboard() {
            activarNav('dashboard');
            const { count: productosCount } = await supabaseAdmin.from('productos').select('*', { count: 'exact', head: true });
            const { count: kitsCount } = await supabaseAdmin.from('kits').select('*', { count: 'exact', head: true });
            const { count: pedidosCount } = await supabaseAdmin.from('pedidos').select('*', { count: 'exact', head: true });
            const { count: reviewsPendientes } = await supabaseAdmin.from('reviews').select('*', { count: 'exact', head: true }).eq('aprobada', false);
            
            document.getElementById('contenido-principal').innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="card bg-white p-6 rounded-xl shadow"><i class="fas fa-microchip text-3xl text-blue-600 mb-2"></i><p class="text-2xl font-bold">${productosCount || 0}</p><p class="text-gray-600">Productos</p></div>
                    <div class="card bg-white p-6 rounded-xl shadow"><i class="fas fa-box text-3xl text-green-600 mb-2"></i><p class="text-2xl font-bold">${kitsCount || 0}</p><p class="text-gray-600">Kits</p></div>
                    <div class="card bg-white p-6 rounded-xl shadow"><i class="fas fa-shopping-cart text-3xl text-orange-600 mb-2"></i><p class="text-2xl font-bold">${pedidosCount || 0}</p><p class="text-gray-600">Pedidos</p></div>
                    <div class="card bg-white p-6 rounded-xl shadow"><i class="fas fa-star text-3xl text-yellow-500 mb-2"></i><p class="text-2xl font-bold">${reviewsPendientes || 0}</p><p class="text-gray-600">Reviews pendientes</p></div>
                </div>
            `;
        }
        
        // ============================================
        // PRODUCTOS
        // ============================================
        async function cargarProductos() {
            activarNav('productos');
            const { data, error } = await supabaseAdmin.from('productos').select('*').order('id', { ascending: false });
            if (error) return;
            productos = data;
            
            document.getElementById('contenido-principal').innerHTML = `
                <div class="flex justify-between items-center mb-6"><h2 class="text-3xl font-bold">Productos</h2><button onclick="abrirModalProducto()" class="btn-primary flex items-center gap-2"><i class="fas fa-plus"></i> Nuevo producto</button></div>
                <div class="bg-white rounded-xl shadow overflow-hidden"><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50 border-b"><tr><th class="text-left p-3">ID</th><th class="text-left p-3">Nombre</th><th class="text-left p-3">Precio</th><th class="text-left p-3">Stock</th><th class="text-left p-3">Acciones</th></tr></thead><tbody>
                    ${productos.map(p => `<tr class="border-b hover:bg-gray-50"><td class="p-3">${p.id}</td><td class="p-3">${p.nombre}</td><td class="p-3 text-green-600">${p.precio.toLocaleString()} Gs.</td><td class="p-3">${p.stock ? '<span class="text-green-600">✔ Disponible</span>' : '<span class="text-red-600">✖ Sin stock</span>'}</td><td class="p-3"><button onclick="editarProducto(${p.id})" class="text-blue-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="eliminarProducto(${p.id})" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
                </tbody></table></div></div>
            `;
        }
        
        function abrirModalProducto(producto = null) {
            document.getElementById('modal-titulo').textContent = producto ? 'Editar Producto' : 'Agregar Producto';
            document.getElementById('producto-id').value = producto?.id || '';
            document.getElementById('prod-nombre').value = producto?.nombre || '';
            document.getElementById('prod-descripcion').value = producto?.descripcion || '';
            document.getElementById('prod-precio').value = producto?.precio || '';
            document.getElementById('prod-categoria').value = producto?.categoria || '';
            document.getElementById('prod-imagen').value = producto?.imagen_principal || '';
            document.getElementById('prod-especificaciones').value = (producto?.especificaciones || []).join('\n');
            document.getElementById('prod-stock').checked = producto?.stock !== false;
            document.getElementById('modal-producto').classList.remove('hidden');
            document.getElementById('modal-producto').style.display = 'flex';
        }
        
        function cerrarModalProducto() {
            document.getElementById('modal-producto').classList.add('hidden');
            document.getElementById('modal-producto').style.display = 'none';
            document.getElementById('form-producto').reset();
        }
        
        document.getElementById('form-producto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('producto-id').value;
            const nombre = document.getElementById('prod-nombre').value;
            const descripcion = document.getElementById('prod-descripcion').value;
            const precio = parseInt(document.getElementById('prod-precio').value);
            const categoria = document.getElementById('prod-categoria').value;
            const imagen_principal = document.getElementById('prod-imagen').value;
            const especificaciones = document.getElementById('prod-especificaciones').value.split('\n').filter(s => s.trim());
            const stock = document.getElementById('prod-stock').checked;
            const productoData = { nombre, descripcion, precio, categoria, imagen_principal, especificaciones, stock, activo: true };
            
            if (id) await supabaseAdmin.from('productos').update(productoData).eq('id', id);
            else await supabaseAdmin.from('productos').insert([productoData]);
            
            cerrarModalProducto();
            cargarProductos();
        });
        
        async function editarProducto(id) { const p = productos.find(p => p.id === id); if (p) abrirModalProducto(p); }
        async function eliminarProducto(id) { if (confirm('¿Eliminar?')) { await supabaseAdmin.from('productos').update({ activo: false }).eq('id', id); cargarProductos(); } }
        
        async function cargarKits() { activarNav('kits'); document.getElementById('contenido-principal').innerHTML = '<h2 class="text-3xl font-bold mb-6">Kits</h2><div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">Gestión de kits próximamente</div>'; }
        async function cargarReviews() { activarNav('reviews'); document.getElementById('contenido-principal').innerHTML = '<h2 class="text-3xl font-bold mb-6">Reviews</h2><div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">Gestión de reviews próximamente</div>'; }
        async function cargarPedidos() { activarNav('pedidos'); document.getElementById('contenido-principal').innerHTML = '<h2 class="text-3xl font-bold mb-6">Pedidos</h2><div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">Gestión de pedidos próximamente</div>'; }
        async function cargarUsuarios() { activarNav('usuarios'); document.getElementById('contenido-principal').innerHTML = '<h2 class="text-3xl font-bold mb-6">Usuarios</h2><div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">Gestión de usuarios próximamente</div>'; }
        
        function activarNav(seccion) { document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active')); document.getElementById(`nav-${seccion}`)?.classList.add('active'); }
        function cerrarSesion() { supabaseAdmin.auth.signOut(); window.location.href = '/'; }
        
        verificarAcceso();
    </script>
</body>
</html>
